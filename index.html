<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
  <title>Football TCG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <h1>Football TCG</h1>
    <div class="score-board" id="score-board">Unten 0 : 0 Oben</div>
    <div class="turn-indicator" id="turn-indicator">Spieler 1 (unten) ist am Zug</div>
    <button class="new-game-btn" id="new-game-btn" type="button">Neues Spiel</button>
  </header>

  <main class="board-wrapper">
    <div class="pitch" id="pitch"></div>
  </main>

  <section class="hand-bar">
    <div class="hand-info">
      <span>Deine Hand (beliebig viele Karten pro Zug spielbar)</span>
      <span id="own-deck-info">Dein Deck: 0 Karten</span>
      <span id="opponent-hand-info">Gegner-Hand: 0 Karte(n), Deck: 0</span>
    </div>
    <div class="hand" id="hand"></div>
  </section>

  <footer class="action-bar">
    <div class="message-line" id="message-line">Waehle einen deiner Spieler aus.</div>
    <div class="action-buttons">
      <button data-action="end-turn" id="end-turn-btn" type="button">Zug beenden</button>
    </div>
  </footer>

  <aside class="effects-panel" id="effects-panel">
    <span class="effects-title">Aktive Effekte:</span>
    <ul class="effects-list" id="effects-list"></ul>
  </aside>

  <aside class="history-panel" id="history-panel">
    <span class="history-title">Verlauf:</span>
    <ul class="history-list" id="history-list"></ul>
  </aside>

  <div class="piece-menu" id="piece-menu" hidden></div>

  <div class="shot-overlay" id="shot-overlay" hidden>
    <div class="shot-die" id="shot-die">6</div>
    <div class="shot-outcome" id="shot-outcome">TOR!</div>
    <div class="shot-meta" id="shot-meta"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
